# Dev / Staging Docker Compose — Hostinger VPS (H2, HTTP only)
#
# Uses the default Spring profile → H2 in-memory DB (no PostgreSQL).
# Images are built on the VPS from source so the frontend API URL is
# pointed at the correct host at build time.
#
# Prerequisites:
#   1. Git-clone or pull the repo on the VPS.
#   2. Copy .env.dev.example to .env.dev and fill in DEV_HOST + JWT_SECRET.
#   3. Open ports 80 and 8080 in the VPS firewall.
#
# Deploy:
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up --build -d
#
# Swagger UI (enabled in default profile):
#   http://<DEV_HOST>:8080/swagger-ui.html
#
# H2 Console:
#   http://<DEV_HOST>:8080/h2-console  (JDBC URL: jdbc:h2:mem:planningpoker)
#
# Tear down:
#   docker compose -f docker-compose.dev.yml --env-file .env.dev down

services:

  # ── Backend (Spring Boot — H2 in-memory, default profile) ──────────────────
  backend:
    image: ${DOCKERHUB_USERNAME}/estimate-backend:latest
    environment:
      # No SPRING_PROFILES_ACTIVE → default profile → H2 + Swagger + H2 Console
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7200000}
      CORS_ALLOWED_ORIGINS: http://${DEV_HOST}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - devnet
    deploy:
      resources:
        limits:
          memory: 384m

  # ── Frontend (React + nginx) ────────────────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME}/estimate-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devnet
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  devnet:
