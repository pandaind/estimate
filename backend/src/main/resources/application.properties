# Server Configuration
server.port=8080

# Database Configuration (H2 In-Memory Database — dev only, not used in production)
spring.datasource.url=jdbc:h2:mem:planningpoker
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
# Dev-only: H2 in-memory DB, no persistent data. Production uses env vars (see application-prod.properties).
spring.datasource.password=password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — disabled in dev; enabled only via application-prod.properties
spring.flyway.enabled=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application Configuration
spring.application.name=Planning Poker Backend

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# JWT Configuration
# REQUIRED: Set JWT_SECRET environment variable before starting the application.
# Generate a secure value with: export JWT_SECRET=$(openssl rand -base64 64)
# The application will refuse to start if JWT_SECRET is not set.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:7200000}

# CORS Configuration
# CRITICAL: Restrict to your actual frontend domain in production!
# Example: cors.allowed-origins=https://planningpoker.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
