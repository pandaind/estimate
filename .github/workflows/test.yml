name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Newman)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Start backend
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac-sha
        run: |
          mvn spring-boot:run -q &
          # Wait for backend to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Install Newman
        working-directory: api-testing
        run: npm ci

      - name: Run API tests
        working-directory: api-testing
        run: npx newman run planning-poker-api.postman_collection.json -e environment.json --reporters cli,json --reporter-json-export ./reports/test-report.json --bail

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: api-testing/reports/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Start backend
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac-sha
        run: |
          mvn spring-boot:run -q &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build & serve frontend
        working-directory: frontend
        run: |
          npm run build
          npx vite preview --port 5173 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Frontend failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Install E2E test dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        working-directory: e2e-tests
        env:
          CI: true
        run: npx playwright test --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e-tests/playwright-report/
            e2e-tests/test-results/
          retention-days: 7
