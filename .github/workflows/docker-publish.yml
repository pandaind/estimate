name: Docker Build & Push

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/estimate-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/estimate-backend:${{ github.event.workflow_run.head_sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://${{ secrets.APP_DOMAIN }}
            VITE_WS_URL=https://${{ secrets.APP_DOMAIN }}/ws
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/estimate-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/estimate-frontend:${{ github.event.workflow_run.head_sha }}
